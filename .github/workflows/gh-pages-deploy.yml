name: Deploy Next.js to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npx next build
      - run: npx next export
      - name: Add base href for repo subpath
        run: |
          REPO_PATH="/Personal-Portfolio/"
          find out -type f -name '*.html' -print0 | xargs -0 sed -i "s|<head>|<head><base href=\"${REPO_PATH}\">|g"
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
